<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Info - Wool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify_content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin: 0.5rem 0;
        }
        .contact-info {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1.5rem;
        }
        .contact-label {
            font-weight: bold;
            color: #555;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .contact-value {
            font-size: 1.1em;
            color: #333;
            margin-top: 0.25rem;
            margin-bottom: 1rem;
        }
        .contact-value:last-child {
            margin-bottom: 0;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Wool Support</h1>
        <p>If you need assistance with Wool, please reach out to us.</p>

        <div class="contact-info">
            <div class="contact-label">Developer</div>
            <div class="contact-value">E. Steffen</div>

            <div class="contact-label">Email</div>
            <div class="contact-value"><a href="mailto:es724040@fh-muenster.de">es724040@fh-muenster.de</a></div>
        </div>
    </div>
</body>
</html>
