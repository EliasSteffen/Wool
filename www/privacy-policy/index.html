<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#faf6f0">
    <meta name="color-scheme" content="light dark">
    <title>Datenschutz — Wool</title>
    <link rel="icon" type="image/png" href="../img/app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../marketing.css">
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" class="svg-defs" aria-hidden="true" focusable="false">
        <symbol id="sym-web" viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </symbol>
        <symbol id="sym-apple" viewBox="0 0 24 24">
            <path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </symbol>
        <symbol id="sym-play" viewBox="0 0 24 24">
            <path fill="currentColor" d="M3 20.5V3.5C3 2.91 3.34 2.39 3.84 2.15L13.69 12 3.84 21.85C3.34 21.6 3 21.09 3 20.5zm13.81-5.38L6.05 21.34l8.49-8.49 2.27 2.27zm3.35-4.31c.34.27.59.69.59 1.19s-.22.9-.57 1.18l-2.29 1.32-2.5-2.5 2.5-2.5 2.27 1.31zM6.05 2.66l10.76 6.22-2.27 2.27-8.49-8.49z"/>
        </symbol>
    </svg>
    <div class="bg-orbs" aria-hidden="true">
        <span class="orb"></span>
        <span class="orb"></span>
    </div>
    <div class="wrap">
        <header class="site-header">
            <a href="/" class="brand">Wool</a>
            <nav class="nav-mini" aria-label="Kurznavigation">
                <a href="/support-info/">Support</a>
                <a href="/privacy-policy/">Datenschutz</a>
            </nav>
        </header>

        <main>
            <div class="legal-card legal-card--policy">
                <h1>Datenschutz</h1>
                <p class="legal-lead">Wool nimmt den Schutz deiner Daten ernst.</p>
                <div class="legal-panel">
                    <div class="legal-value">
                        Wool erhebt, speichert und gibt keine personenbezogenen Nutzerdaten weiter.
                    </div>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-stores" aria-label="Demo und Stores">
                <a class="footer-icon-link" href="/demo/" aria-label="Web-Demo">
                    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><use href="#sym-web"/></svg>
                </a>
                <a class="footer-icon-link" href="https://apps.apple.com/de/app/wool/id6758386581" rel="noopener noreferrer" target="_blank" aria-label="App Store">
                    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><use href="#sym-apple"/></svg>
                </a>
                <button type="button" class="footer-icon-link footer-icon-link--disabled js-play-soon" aria-label="Google Play: demnächst">
                    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><use href="#sym-play"/></svg>
                </button>
            </nav>
            <p class="footer-meta">
                <a href="/support-info/">Support</a>
                <span class="sep">·</span>
                <a href="/privacy-policy/">Datenschutz</a>
            </p>
        </footer>
    </div>

    <dialog id="play-soon-pop" class="popover-soon">
        <p class="popover-soon__title">Coming soon</p>
        <p class="popover-soon__text">Die Android-Version auf Google Play folgt.</p>
        <form method="dialog">
            <button type="submit" class="btn btn-primary popover-soon__close">OK</button>
        </form>
    </dialog>
    <script>
        (function () {
            var dlg = document.getElementById("play-soon-pop");
            if (!dlg || typeof dlg.showModal !== "function") return;
            document.querySelectorAll(".js-play-soon").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    dlg.showModal();
                });
            });
        })();
    </script>
</body>
</html>
