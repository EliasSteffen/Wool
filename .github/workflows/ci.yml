name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-web:
    name: Export Web
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.5.1.stable \
             ~/.local/share/godot/export_templates/4.5.1.stable

      - name: Export
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html
          echo "success" > build/web/success

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7

  export-windows:
    name: Export Windows
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.5.1.stable \
             ~/.local/share/godot/export_templates/4.5.1.stable

      - name: Export
        run: |
          mkdir -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/Wool.exe
          echo "success" > build/windows/success

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows
          retention-days: 7

  generate-badges:
    name: Generate Badges
    runs-on: ubuntu-latest
    needs: [export-web, export-windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: build/windows

      - name: Generate version.json and badge files
        run: python3 scripts/tools/update_version_json.py

      - uses: actions/upload-artifact@v4
        with:
          name: badges
          path: public
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [export-web, generate-badges]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - uses: actions/download-artifact@v4
        with:
          name: badges
          path: public

      - name: Assemble site
        run: |
          mkdir -p public/demo
          cp -r build/web/* public/demo/
          cp -r www/* public/

      - name: Add COOP/COEP service worker for Godot threading
        run: |
          curl -sL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js \
            -o public/demo/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' public/demo/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
